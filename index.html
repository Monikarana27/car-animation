<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NEON RUNNER</title>
<style>
  /* ============================================================
     BASE PAGE / HUD STYLING
     ============================================================ */
  html, body {
    margin: 0; width: 100%; height: 100%; overflow: hidden;
    background: #000;
    font-family: 'Courier New', monospace;
  }
  canvas { display: block; }

  #hud {
    position: fixed; inset: 0; pointer-events: none;
    color: #00f7ff;
    text-shadow: 0 0 6px rgba(0,247,255,0.8);
  }
  #hud .topLeft {
    position: absolute; top: 18px; left: 20px;
    font-size: 13px; letter-spacing: 2px;
  }
  #hud .topRight {
    position: absolute; top: 18px; right: 20px;
    font-size: 18px; letter-spacing: 2px;
    text-align: right;
  }
  #hud .hint {
    position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%);
    font-size: 11px; letter-spacing: 2px; opacity: 0.6;
  }

  /* ---------- GAME OVER OVERLAY ---------- */
  #gameOver {
    position: fixed; inset: 0;
    display: none; /* toggled to flex on collision */
    align-items: center; justify-content: center; flex-direction: column;
    background: rgba(0, 0, 0, 0.82);
    color: #ff2b6f;
    text-shadow: 0 0 10px rgba(255, 43, 111, 0.8);
    font-family: 'Courier New', monospace;
    text-align: center;
  }
  #gameOver h1 {
    font-size: 32px; letter-spacing: 6px; margin: 0 0 10px;
  }
  #gameOver p {
    color: #9df8ff; font-size: 14px; letter-spacing: 2px; margin: 4px 0 22px;
    text-shadow: 0 0 6px rgba(0,247,255,0.6);
  }
  #restartBtn {
    font-family: 'Courier New', monospace;
    font-size: 14px; letter-spacing: 3px;
    color: #00f7ff;
    background: transparent;
    border: 1px solid #00f7ff;
    padding: 12px 28px;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }
  #restartBtn:hover {
    background: #00f7ff;
    color: #000;
  }
</style>
</head>
<body>

  <div id="hud">
    <div class="topLeft">NEON RUNNER // SYSTEM ACTIVE</div>
    <div class="topRight" id="scoreText">SCORE: 0</div>
    <div class="hint">◀ / A &nbsp; &nbsp; D / ▶ &nbsp;— SWITCH LANES</div>
  </div>

  <div id="gameOver">
    <h1>SYSTEM FAILURE</h1>
    <p id="finalScoreText">FINAL SCORE: 0</p>
    <button id="restartBtn">RESTART</button>
  </div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from "three";

/* ============================================================
   CONFIG — tweak these to change the feel of the game
   ============================================================ */
const CONFIG = {
  laneCount: 3,          // how many lanes
  laneWidth: 2.6,        // distance between lane centers
  laneSwitchSpeed: 12,   // how snappy lane changes feel (higher = snappier)

  baseSpeed: 16,         // starting obstacle speed (units/sec)
  speedRamp: 0.12,       // speed gained per second survived
  maxSpeed: 46,          // speed cap

  spawnIntervalStart: 0.95, // seconds between obstacle spawns at game start
  spawnIntervalMin: 0.45,   // fastest spawn rate as difficulty rises

  spawnDistance: -70,    // world Z where obstacles are born (far away)
  despawnDistance: 8,    // world Z where obstacles are cleaned up (behind camera)
  carZ: 0,               // the car's fixed Z position
  collisionZTolerance: 1.1, // how close (in Z) an obstacle must be to the car to count as a hit
  collisionLaneTolerance: 0.9, // fraction of a lane width still considered "same lane"

  colors: {
    cyan: 0x00f7ff,
    magenta: 0xff2bd6,
    amber: 0xffb000,
    danger: 0xff2b4d
  }
};

/* ============================================================
   RENDERER / SCENE / CAMERA
   — deliberately NO post-processing / bloom, so colors stay
     crisp and never bleed onto neighboring geometry.
   ============================================================ */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
scene.fog = new THREE.Fog(0x000000, 20, 75);

const camera = new THREE.PerspectiveCamera(58, innerWidth / innerHeight, 0.1, 200);
camera.position.set(0, 3.4, 7.5);
camera.lookAt(0, 1, -10);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.NoToneMapping;   // keeps neon colors flat and crisp, no wash/bleed
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

/* ============================================================
   LIGHTING — just enough to read shape, no glow/bloom passes
   ============================================================ */
scene.add(new THREE.AmbientLight(0x223344, 0.6));
const keyLight = new THREE.DirectionalLight(0xffffff, 0.7);
keyLight.position.set(3, 8, 5);
scene.add(keyLight);
const rimCyan = new THREE.PointLight(0x00f7ff, 4, 12);
rimCyan.position.set(-2, 2, 2);
scene.add(rimCyan);
const rimMagenta = new THREE.PointLight(0xff2bd6, 3, 12);
rimMagenta.position.set(2, 2, -2);
scene.add(rimMagenta);

/* ============================================================
   HELPER — crisp black edge outline for any mesh
   (reads as a "hacker HUD" line-art look, keeps silhouettes sharp)
   ============================================================ */
const outlineMat = new THREE.LineBasicMaterial({ color: 0x000000 });
function addEdges(mesh){
  const edges = new THREE.EdgesGeometry(mesh.geometry, 20);
  const line = new THREE.LineSegments(edges, outlineMat);
  mesh.add(line);
  return mesh;
}

/* ============================================================
   ROAD — dark asphalt strip + glowing lane divider lines
   ============================================================ */
const roadWidth = CONFIG.laneWidth * CONFIG.laneCount + 1.5;
const road = new THREE.Mesh(
  new THREE.PlaneGeometry(roadWidth, 200),
  new THREE.MeshStandardMaterial({ color: 0x050507, metalness: 0.4, roughness: 0.8 })
);
road.rotation.x = -Math.PI / 2;
road.position.z = -70;
scene.add(road);

function laneCenterX(laneIndex){
  // lane 0 is left-most, centered lanes straddle x = 0
  const offset = (laneIndex - (CONFIG.laneCount - 1) / 2) * CONFIG.laneWidth;
  return offset;
}
for (let i = 0; i <= CONFIG.laneCount; i++){
  const x = (i - CONFIG.laneCount / 2) * CONFIG.laneWidth;
  const divider = new THREE.Mesh(
    new THREE.PlaneGeometry(0.05, 200),
    new THREE.MeshBasicMaterial({ color: CONFIG.colors.cyan, transparent: true, opacity: 0.5 })
  );
  divider.rotation.x = -Math.PI / 2;
  divider.position.set(x, 0.01, -70);
  scene.add(divider);
}

/* ============================================================
   THE CAR — sharp, low, sports-car silhouette (Hot Wheels vibe)
   ============================================================ */
function buildCar(){
  const group = new THREE.Group();

  const bodyMat = new THREE.MeshStandardMaterial({ color: 0x101015, metalness: 0.85, roughness: 0.25, emissive: 0x00151a, emissiveIntensity: 0.6 });
  const darkMat = new THREE.MeshStandardMaterial({ color: 0x08080a, metalness: 0.6, roughness: 0.5 });
  const glassMat = new THREE.MeshStandardMaterial({ color: 0x0a1418, metalness: 0.9, roughness: 0.1, transparent: true, opacity: 0.85 });
  const cyanEmissive = new THREE.MeshStandardMaterial({ color: 0x001217, emissive: CONFIG.colors.cyan, emissiveIntensity: 1.4 });
  const redEmissive = new THREE.MeshStandardMaterial({ color: 0x170003, emissive: CONFIG.colors.danger, emissiveIntensity: 1.2 });

  // low, wide chassis
  const chassis = addEdges(new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.32, 3.6), bodyMat));
  chassis.position.y = 0.42;
  group.add(chassis);

  // sloped hood (angled box gives a sharp, non-blocky front end)
  const hood = addEdges(new THREE.Mesh(new THREE.BoxGeometry(1.55, 0.22, 1.1), bodyMat));
  hood.position.set(0, 0.58, 1.35);
  hood.rotation.x = 0.12;
  group.add(hood);

  // tapered nose (flattened cone reads as a pointed sports-car front)
  const nose = addEdges(new THREE.Mesh(new THREE.ConeGeometry(0.85, 0.9, 4), bodyMat));
  nose.rotation.x = Math.PI / 2;
  nose.rotation.y = Math.PI / 4;
  nose.scale.set(1, 1, 0.5);
  nose.position.set(0, 0.44, 2.05);
  group.add(nose);

  // cabin wedge, swept back
  const cabin = addEdges(new THREE.Mesh(new THREE.BoxGeometry(1.25, 0.4, 1.5), bodyMat));
  cabin.position.set(0, 0.78, -0.25);
  cabin.rotation.x = -0.05;
  group.add(cabin);

  // windshield (raked, not vertical — key to a "sharp" silhouette)
  const windshield = addEdges(new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.35, 0.06), glassMat));
  windshield.position.set(0, 0.92, 0.5);
  windshield.rotation.x = -0.55;
  group.add(windshield);

  // rear deck + spoiler
  const rearDeck = addEdges(new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.3, 0.9), bodyMat));
  rearDeck.position.set(0, 0.6, -1.55);
  group.add(rearDeck);

  const spoiler = addEdges(new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.06, 0.35), darkMat));
  spoiler.position.set(0, 0.95, -1.9);
  group.add(spoiler);
  [0.5, -0.5].forEach(x => {
    const strut = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.28, 0.06), darkMat);
    strut.position.set(x, 0.78, -1.9);
    group.add(strut);
  });

  // headlights + taillights
  [0.55, -0.55].forEach(x => {
    const hl = addEdges(new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.12, 0.06), cyanEmissive));
    hl.position.set(x, 0.48, 2.55);
    group.add(hl);

    const tl = addEdges(new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.12, 0.06), redEmissive));
    tl.position.set(x, 0.55, -2.0);
    group.add(tl);
  });

  // wheels — tyre + simple glowing rim
  const wheelPositions = [
    [-0.85, 0.32, 1.1], [0.85, 0.32, 1.1],
    [-0.85, 0.32, -1.1], [0.85, 0.32, -1.1]
  ];
  const tyreGeo = new THREE.CylinderGeometry(0.34, 0.34, 0.26, 18);
  const rimGeo = new THREE.CylinderGeometry(0.16, 0.16, 0.28, 18);
  const wheels = [];
  wheelPositions.forEach(([x,y,z]) => {
    const tyre = new THREE.Mesh(tyreGeo, darkMat);
    tyre.rotation.z = Math.PI / 2;
    tyre.position.set(x, y, z);
    group.add(tyre);

    const rim = new THREE.Mesh(rimGeo, cyanEmissive);
    rim.rotation.z = Math.PI / 2;
    rim.position.set(x, y, z);
    group.add(rim);

    wheels.push(tyre);
  });

  // flat underglow plate (crisp emissive color, no bloom pass = no smear)
  const underGlow = new THREE.Mesh(
    new THREE.PlaneGeometry(1.5, 3.2),
    new THREE.MeshBasicMaterial({ color: CONFIG.colors.cyan, transparent: true, opacity: 0.35 })
  );
  underGlow.rotation.x = -Math.PI / 2;
  underGlow.position.y = 0.06;
  group.add(underGlow);

  group.userData.wheels = wheels;
  return group;
}

const car = buildCar();
scene.add(car);

/* ============================================================
   GAME STATE
   ============================================================ */
let currentLane = Math.floor(CONFIG.laneCount / 2); // start in the middle lane
let targetX = laneCenterX(currentLane);

let obstacles = [];       // active obstacle meshes
let speed = CONFIG.baseSpeed;
let spawnTimer = 0;
let spawnInterval = CONFIG.spawnIntervalStart;
let elapsed = 0;
let score = 0;
let gameOver = false;

const scoreText = document.getElementById("scoreText");
const gameOverEl = document.getElementById("gameOver");
const finalScoreText = document.getElementById("finalScoreText");
const restartBtn = document.getElementById("restartBtn");

/* ============================================================
   OBSTACLES — simple neon cubes / barriers
   ============================================================ */
const obstacleColors = [CONFIG.colors.cyan, CONFIG.colors.magenta, CONFIG.colors.amber];

function spawnObstacle(){
  const lane = Math.floor(Math.random() * CONFIG.laneCount);
  const color = obstacleColors[Math.floor(Math.random() * obstacleColors.length)];

  // occasionally spawn a low wide "barrier" instead of a cube, for variety
  const isBarrier = Math.random() < 0.3;
  const geo = isBarrier
    ? new THREE.BoxGeometry(CONFIG.laneWidth * 0.8, 0.5, 0.4)
    : new THREE.BoxGeometry(1.1, 1.1, 1.1);

  const mat = new THREE.MeshStandardMaterial({
    color: 0x050505,
    emissive: color,
    emissiveIntensity: 1.1,
    metalness: 0.3,
    roughness: 0.6
  });

  const obstacle = addEdges(new THREE.Mesh(geo, mat));
  obstacle.position.set(laneCenterX(lane), isBarrier ? 0.28 : 0.58, CONFIG.spawnDistance);
  obstacle.userData.lane = lane;
  scene.add(obstacle);
  obstacles.push(obstacle);
}

/* ============================================================
   INPUT — arrow keys or A/D to switch lanes
   ============================================================ */
addEventListener("keydown", (e) => {
  if (gameOver) return;
  if (e.code === "ArrowLeft" || e.code === "KeyA"){
    currentLane = Math.max(0, currentLane - 1);
    targetX = laneCenterX(currentLane);
  }
  if (e.code === "ArrowRight" || e.code === "KeyD"){
    currentLane = Math.min(CONFIG.laneCount - 1, currentLane + 1);
    targetX = laneCenterX(currentLane);
  }
});

/* ============================================================
   COLLISION CHECK
   ============================================================ */
function checkCollision(obstacle){
  const closeEnoughInZ = Math.abs(obstacle.position.z - CONFIG.carZ) < CONFIG.collisionZTolerance;
  if (!closeEnoughInZ) return false;
  const sameLaneX = Math.abs(obstacle.position.x - car.position.x) < CONFIG.laneWidth * CONFIG.collisionLaneTolerance / 2;
  return sameLaneX;
}

/* ============================================================
   GAME OVER / RESTART
   ============================================================ */
function triggerGameOver(){
  gameOver = true;
  finalScoreText.textContent = `FINAL SCORE: ${Math.floor(score)}`;
  gameOverEl.style.display = "flex";
}

function restartGame(){
  // clear obstacles
  obstacles.forEach(o => scene.remove(o));
  obstacles = [];

  currentLane = Math.floor(CONFIG.laneCount / 2);
  targetX = laneCenterX(currentLane);
  speed = CONFIG.baseSpeed;
  spawnTimer = 0;
  spawnInterval = CONFIG.spawnIntervalStart;
  elapsed = 0;
  score = 0;
  gameOver = false;

  gameOverEl.style.display = "none";
}
restartBtn.addEventListener("click", restartGame);

/* ============================================================
   MAIN LOOP
   ============================================================ */
const clock = new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  if (!gameOver){
    elapsed += dt;

    // difficulty ramps smoothly over time
    speed = Math.min(CONFIG.maxSpeed, CONFIG.baseSpeed + elapsed * CONFIG.speedRamp * 10);
    spawnInterval = Math.max(CONFIG.spawnIntervalMin, CONFIG.spawnIntervalStart - elapsed * 0.01);

    // smooth lane switching (eased, not a snap-teleport)
    car.position.x += (targetX - car.position.x) * Math.min(1, CONFIG.laneSwitchSpeed * dt);
    car.rotation.z = (targetX - car.position.x) * 0.12; // slight lean into the lane change
    car.userData.wheels.forEach(w => w.rotation.x -= dt * (6 + speed * 0.3));

    // spawn obstacles on a timer
    spawnTimer += dt;
    if (spawnTimer >= spawnInterval){
      spawnTimer = 0;
      spawnObstacle();
    }

    // move obstacles toward the camera, check collisions, clean up passed ones
    for (let i = obstacles.length - 1; i >= 0; i--){
      const o = obstacles[i];
      o.position.z += dt * speed;

      if (checkCollision(o)){
        triggerGameOver();
        break;
      }
      if (o.position.z > CONFIG.despawnDistance){
        scene.remove(o);
        obstacles.splice(i, 1);
      }
    }

    // score climbs with survival time and speed — rewards avoiding obstacles longer
    score += dt * (10 + speed * 0.5);
    scoreText.textContent = `SCORE: ${Math.floor(score)}`;
  }

  renderer.render(scene, camera);
}
animate();

addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
